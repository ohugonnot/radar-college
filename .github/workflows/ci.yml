name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Validate + Build + E2E
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install npm dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright browser (Chromium)
        run: npx playwright install chromium --with-deps

      - name: Validate quiz pools (integrity check)
        run: node validate.js

      - name: Build (inline all sources into index.html)
        run: ./build.sh

      - name: Ensure build did not change tracked files unexpectedly
        # build.sh bumps CACHE_NAME in sw.js à chaque run → on ignore sw.js pour ce diff.
        run: |
          git diff --exit-code -- . ':!sw.js' || (
            echo "::warning::build.sh a modifié des fichiers (hors sw.js). Relance ./build.sh localement et commit."
            exit 1
          )

      - name: Start local server
        run: |
          python3 -m http.server 8765 --bind 127.0.0.1 &
          echo $! > /tmp/server.pid
          # Attendre que le port réponde
          for i in $(seq 1 20); do
            if curl -sf -o /dev/null http://127.0.0.1:8765/index.html; then echo "server up"; exit 0; fi
            sleep 0.5
          done
          echo "server failed to start" && exit 1

      - name: Run Playwright tests
        env:
          TEST_BASE: http://127.0.0.1:8765
        run: npx playwright test --reporter=list

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Stop local server
        if: always()
        run: kill $(cat /tmp/server.pid) 2>/dev/null || true
